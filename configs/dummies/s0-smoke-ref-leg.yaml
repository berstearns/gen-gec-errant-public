# S0 smoke — reference-annotation (G3) leg, dispatched finding #1
# gen-gec-review-specs/KICKOFF-executor.md task 1.3 / 60-results-ledger.md cell S0-a
# Usage: python -m gen_gec_errant.pipeline --config configs/dummies/s0-smoke-ref-leg.yaml
#
# NOTE (logged substitution, Cat-F provenance): the registry/remote path for
# ft-gpt2-small is .../gpt2/gpt2-small-all-data/best/checkpoint-7596 (rclone
# remote layout), but that reorganized tree has not been synced to this local
# machine yet — only the original dated training-run folders exist locally,
# and the numbered checkpoint-7596 subfolder there has no weights file (only
# config/tokenizer/trainer_state). The local "final" checkpoint of the SAME
# training run (2026-02-23-model/gpt2-small-all-data-resume/final) does have
# full weights and is used here instead. This is a smoke test of the
# reference-annotation pipeline mechanics only (S0 does not test C1) — see
# 90-open-questions.md for the open local/remote path-layout mismatch.
data_loader:
  data_path: ./data/celva-2-sample.csv
  text_column: text
  max_sentences: 10
  min_words: 10
  max_words: 500
  prompt_ratio: 0.5
  min_prompt_words: 5
  split_sentences: true

generation:
  max_new_tokens: 50
  min_new_tokens: 10
  temperature: 1.0
  top_k: 50
  top_p: 0.95
  do_sample: true
  repetition_penalty: 1.2

gec:
  method: dedicated
  model_id: grammarly/coedit-large
  batch_size: 4
  device: auto

annotation:
  lang: en

analysis:
  skip_plots: false
  top_n_error_types: 10

models:
  - name: ft-gpt2-small
    hf_model_id: PLACEHOLDER_MODELS_ROOT/2026-02-23-model/gpt2-small-all-data-resume/final
    model_family: gpt2
    is_learner_tuned: true

batch_size: 2
device: auto
seed: 42
output_dir: outputs/s0-smoke-ref-leg
skip_plots: false
include_learner_baseline: true

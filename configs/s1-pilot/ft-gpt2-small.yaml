# === EXPLORATORY — NOT CONFIRMATORY ===
# This pilot exists to sanity-check the S1 machinery (checkpoints, GEC,
# annotation, coverage) at moderate scale before committing GPU spend to the
# full CELVA-SP run. Its numbers carry ZERO weight toward the C1 decision
# rule in 20-preregistration.md — do not cite them as evidence for or against
# the claim. Confirmatory cells are configs/s1-core-contrast/*.yaml only.
#
# S1 pilot — ft-gpt2-small (fine-tuned) — CELVA-SP capped at 100 sentences
# gen-gec-review-specs/50-dispatch-log.md dispatch #4a, shrunk per dispatch #5
# (CPU pilots are tiny — a few hours max; the first 300-sentence attempt
# projected ~8h and was killed). seed 42 + deterministic loader means these
# 100 sentences are a prefix of gpt2-small's already-completed 300, so this
# stays an exploratory comparison over the shared first 100.
# Usage: python -m gen_gec_errant.pipeline --config configs/s1-pilot/ft-gpt2-small.yaml
data_loader:
  data_path: ./data/norm-CELVA-SP.csv
  text_column: text
  max_sentences: 100
  min_words: 10
  max_words: 500
  prompt_ratio: 0.5
  min_prompt_words: 5
  split_sentences: true

generation:
  max_new_tokens: 50
  min_new_tokens: 10
  temperature: 1.0
  top_k: 50
  top_p: 0.95
  do_sample: true
  repetition_penalty: 1.2

gec:
  method: dedicated
  model_id: grammarly/coedit-large
  batch_size: 32
  device: auto

annotation:
  lang: en

analysis:
  skip_plots: false
  top_n_error_types: 10

models:
  - name: ft-gpt2-small
    hf_model_id: PLACEHOLDER_MODELS_ROOT/gpt2/gpt2-small-all-data/best/checkpoint-7596
    model_family: gpt2
    is_learner_tuned: true
    batch_size: 16

batch_size: 16
device: auto
seed: 42
output_dir: outputs/s1-pilot/ft-gpt2-small
skip_plots: false
# OFF (dispatch #5): gpt2-small.yaml's completed run already produced a
# learner_profile.json (n=300, superset of these 100 sentences) — rerunning
# the identical reference GEC leg here would just burn CPU a second time.
include_learner_baseline: false

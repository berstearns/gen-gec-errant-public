# === EXPLORATORY — NOT CONFIRMATORY ===
# This pilot exists to sanity-check the S1 machinery (checkpoints, GEC,
# annotation, coverage) at moderate scale before committing GPU spend to the
# full CELVA-SP run. Its numbers carry ZERO weight toward the C1 decision
# rule in 20-preregistration.md — do not cite them as evidence for or against
# the claim. Confirmatory cells are configs/s1-core-contrast/*.yaml only.
#
# S1 pilot — gpt2-small (pretrained) — CELVA-SP capped at 300 sentences
# gen-gec-review-specs/50-dispatch-log.md dispatch #4a.
# Usage: python -m gen_gec_errant.pipeline --config configs/s1-pilot/gpt2-small.yaml
data_loader:
  data_path: ./data/norm-CELVA-SP.csv
  text_column: text
  max_sentences: 300
  min_words: 10
  max_words: 500
  prompt_ratio: 0.5
  min_prompt_words: 5
  split_sentences: true

generation:
  max_new_tokens: 50
  min_new_tokens: 10
  temperature: 1.0
  top_k: 50
  top_p: 0.95
  do_sample: true
  repetition_penalty: 1.2

gec:
  method: dedicated
  model_id: grammarly/coedit-large
  batch_size: 32
  device: auto

annotation:
  lang: en

analysis:
  skip_plots: false
  top_n_error_types: 10

models:
  - name: gpt2-small
    hf_model_id: gpt2
    model_family: gpt2
    batch_size: 16

batch_size: 16
device: auto
seed: 42
output_dir: outputs/s1-pilot/gpt2-small
skip_plots: false
include_learner_baseline: true
